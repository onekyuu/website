version: "3.8"

services:
  website:
    image: registry.cn-hangzhou.aliyuncs.com/keyu-images/website-frontend-base:v1.0.18
    container_name: website-app
    restart: unless-stopped
    working_dir: /app
    command: ["node", "server.js"]
    ports:
      - "3001:3001"
    env_file:
      - /var/www/env/website.env
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3001
      - HOSTNAME=0.0.0.0
    volumes:
      - ./release:/app:ro
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
