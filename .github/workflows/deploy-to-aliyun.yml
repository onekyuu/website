name: Deploy to Aliyun ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: 🛎️ Checkout code
        uses: actions/checkout@v5

      - name: 📦 Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.34.1
          run_install: false

      - name: 🧰 Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ✅ Validate frontend
        run: |
          pnpm lint
          pnpm typecheck

      - name: 🏗️ Build frontend artifact
        env:
          BUILD_ID: ${{ github.sha }}
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
        run: |
          test -n "$NEXT_PUBLIC_API_BASE_URL"
          pnpm build

      - name: 📦 Prepare standalone artifact
        run: |
          rm -rf deploy
          mkdir -p deploy/release/.next

          cp -a .next/standalone/. deploy/release/
          cp -a .next/static deploy/release/.next/static
          cp -a public deploy/release/public
          rm -f deploy/release/.env deploy/release/public/.DS_Store
          cp docker-compose.deploy.yml deploy/docker-compose.yml
          tar -C deploy -czf deploy/website-release.tar.gz release docker-compose.yml
          ls -lh deploy/website-release.tar.gz

      - name: 🐧 Set up SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_PRIVATE_KEY }}

      - name: 📤 Copy build artifact to Aliyun
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }} \
            "mkdir -p /var/www/website"

          rsync -az --partial --info=progress2 --timeout=120 \
            -e "ssh -o StrictHostKeyChecking=no" \
            deploy/website-release.tar.gz \
            ${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}:/var/www/website/website-release.tar.gz

      - name: 🔐 Log in to Aliyun Container Registry
        env:
          ACR_REGISTRY: registry.cn-hangzhou.aliyuncs.com
          ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}
        run: |
          test -n "$ACR_USERNAME"
          test -n "$ACR_PASSWORD"

          printf '%s' "$ACR_PASSWORD" | ssh \
            -o StrictHostKeyChecking=no \
            ${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }} \
            "sudo docker login '$ACR_REGISTRY' --username '$ACR_USERNAME' --password-stdin"

      - name: 🚀 Restart app on Aliyun
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o TCPKeepAlive=yes \
            ${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }} << 'EOF'
              set -eu
              cd /var/www/website
              test "$PWD" = "/var/www/website"
              
              echo "🐳 Stopping existing containers..."
              sudo docker compose down || true

              RUNTIME_IMAGE="registry.cn-hangzhou.aliyuncs.com/keyu-images/website-frontend-base:v1.0.18"

              echo "🐳 Pulling runtime image..."
              sudo docker pull "$RUNTIME_IMAGE"

              echo "📦 Extracting build artifact..."
              sudo docker run --rm \
                -v /var/www/website:/work \
                -w /work \
                "$RUNTIME_IMAGE" \
                sh -c 'set -eu; find . -mindepth 1 -maxdepth 1 ! -name website-release.tar.gz -exec rm -rf {} \; ; tar -xzf website-release.tar.gz -C .; rm -f website-release.tar.gz'

              echo "🚀 Starting containers..."
              sudo docker compose up -d
              
              echo "🧹 Cleaning unused Docker resources..."
              sudo docker image prune -f
          EOF

      - name: Cleanup
        if: always()
        run: |
          echo "✅ Deployment completed"
